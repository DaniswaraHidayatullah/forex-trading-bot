name: Signal Bot

# Bot sinyal terjadwal (GRATIS, tanpa server 24/7).
# - cron tiap 30 menit (jadwal GitHub bisa molor sedikit; run antre dijalankan
#   berurutan berkat concurrency group -> log commit mencegah kirim dobel)
# - workflow_dispatch: bisa dijalankan manual dari tab Actions
#
# Rahasia di Settings -> Secrets and variables -> Actions:
#   TWELVEDATA_API_KEY, DISCORD_BOT_TOKEN + DISCORD_CHANNEL_ID (atau DISCORD_WEBHOOK_URL)
# Non-rahasia (tab Variables): SIGNAL_PROFILES, SIGNAL_MIN_CONFIDENCE, SIGNAL_MAX_RISK_USD

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: signal-bot
  cancel-in-progress: false

permissions:
  contents: write   # untuk commit signals/log.json (riwayat & anti-spam)

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r data_service/requirements.txt

      - name: Run signal bot
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SIGNAL_PROFILES: ${{ vars.SIGNAL_PROFILES || 'harian' }}
          SIGNAL_MIN_CONFIDENCE: ${{ vars.SIGNAL_MIN_CONFIDENCE || 'none' }}
          SIGNAL_MAX_RISK_USD: ${{ vars.SIGNAL_MAX_RISK_USD || '12' }}
        run: python tools/run_signal_once.py

      - name: Commit log sinyal
        run: |
          if git status --porcelain signals/ | grep -q .; then
            git config user.name "signal-bot"
            git config user.email "bot@users.noreply.github.com"
            git add signals/
            git commit -m "log: update sinyal [skip ci]"
            git pull --rebase origin main || true
            git push
          else
            echo "log tidak berubah"
          fi
